<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Array Methods Project</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h2>User Array Methods</h2>
        <div>
            <label for="name">Name :</label>
            <input type="text" id="name" placeholder="Enter Name">

            <label for="age">Age :</label>
            <input type="number" id="age" placeholder="Enter Age">


        </div>

        <label for="search" class="search">Search</label>
        <input type="text" id="searchName" placeholder="Search Name">




        <br>

        <button onclick="addUser()">Add</button>
        <button onclick="addFirst()">Unshift</button>
        <button onclick="removeLast()">Pop</button>
        <button onclick="removeFirst()">Shift</button>
        <button onclick="spliceData()">Splice</button>


        <br>
        <button onclick="sliceData()">Slice</button>
        <button onclick="concatData()">Concat</button>
        <button onclick="checkIncludes()">Includes</button>
        <button onclick="checkIndex()">IndexOf</button>
        <button onclick="findUser()">Find</button>

        <br>

        <button onclick="mapData()">Map</button>
        <button onclick="filterData()">Filter</button>
        <button onclick="reduceData()">Reduce</button>
        <button onclick="sortData()">Sort</button>
        <button onclick="reverseData()">Reverse</button>

        <br>

        <button onclick="joinData()">Join</button>
        <button onclick="convertToString()">ToString</button>
        <button onclick="flatData()">Flat</button>
        <button onclick="SomeData()">Some</button>
        <button onclick="showValues()">Values</button>

        <br>

        <button onclick="EveryData()">every</button>
        <button onclick="LengthData()">length</button>


        <div id="output" class="output"></div>
        <div id="result" class="result-box"></div>

    </div>

    <script src="script.js"></script>
</body>

</html>
